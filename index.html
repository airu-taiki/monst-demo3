<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Monst Security Demo</title>
  <link rel="stylesheet" href="styles.css?v=3" />
</head>
<body>
  <div id="app">
    <div id="stage">
      <video id="bgmVideo" class="bg-video hidden" playsinline preload="auto" loop>
        <source src="assets/bgm.mp4" type="video/mp4">
        <source src="assets/BGM.MOV" type="video/quicktime">
      </video>

      <video id="alertVideo" class="alert-video hidden" playsinline preload="auto">
        <source src="assets/alert.mp4" type="video/mp4">
        <source src="assets/alert.mov" type="video/quicktime">
      </video>

      <video id="glitchVideo" class="overlay-video hidden" playsinline preload="auto">
        <source src="assets/glitch.mp4" type="video/mp4">
        <source src="assets/glitch.mov" type="video/quicktime">
        <source src="assets/グリッチ.MOV" type="video/quicktime">
      </video>

      <div id="intro" class="panel">
        <div class="x-card">
          <div class="x-header">
            <div class="avatar"></div>
            <div>
              <div class="name">モンスト速報JP</div>
              <div class="handle">@monst_event_info</div>
            </div>
          </div>
          <div class="post-body">
            <p>これ普通にヤバいw</p>
            <p>無料でオーブ配布してるらしい</p>
            <p class="link">http://monst-free-orb.xyz</p>
          </div>
        </div>
        <div class="hook">ほんとにそのリンク押していいの？</div>
        <button id="startBtn">演出スタート</button>
      </div>

      <div id="hud" class="hidden">
        <div class="top-label">STAGE 1</div>
        <div class="hp-wrap">
          <span>HP</span>
          <div class="hp-bar"><div class="hp-fill"></div></div>
        </div>
        <div id="bossBlock" class="hidden">
          <div class="boss-title">BOSS：Mirai</div>
          <div class="boss-sub">BOTNET ALERT</div>
          <div class="boss-hp"><div class="boss-hp-fill"></div></div>
        </div>
      </div>

      <div id="comboLabel" class="hidden">友情コンボ：イルカ乱舞</div>
      <div id="hitCounter" class="hidden">1 Hits</div>
      <div id="strikeShot" class="hidden">
        <div class="ss1">STRIKE SHOT</div>
        <div class="ss2">SS：DISCLOSE FLICK</div>
      </div>

      <div id="systemError" class="hidden center-text danger">System Error</div>
      <div id="systemFailure" class="hidden center-text neutral">System Failure</div>

      <div id="awareness" class="hidden">
        <div class="aware1">そのリンク、本当に安全ですか？</div>
        <div class="aware2">初期パスワード、変更していますか？</div>
        <div class="aware3">※これは演出です</div>
      </div>

      <div id="dolphinLayer"></div>
    </div>
  </div>

  <script src="script.js?v=3"></script>
</body>
</html>
